<script>
// ── Citazioni <cit autore="..."> ─────────────────────────────
(function() {
  document.querySelectorAll('cit[autore]').forEach(function(el) {
    var text = el.textContent.trim();
    var author = el.getAttribute('autore');
    el.textContent = '';
    var q = document.createTextNode('« ' + text + ' »');
    var aut = document.createElement('span');
    aut.className = 'cit-aut';
    aut.textContent = '— ' + author;
    el.appendChild(q);
    el.appendChild(aut);
  });
})();

// ── PDF export with QR codes for videos ───────────────────────
function exportPDF() {
  var wraps = document.querySelectorAll('.video-wrap');
  var inserted = [];

  wraps.forEach(function(wrap) {
    var iframe = wrap.querySelector('iframe');
    if (!iframe) return;
    var m = iframe.src.match(/\/embed\/([^?&]+)/);
    if (!m) return;
    var vid = m[1];
    var ytUrl = 'https://www.youtube.com/watch?v=' + vid;
    var qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(ytUrl);
    var cap = iframe.title || '';

    var div = document.createElement('div');
    div.className = 'video-qr-print';
    div.innerHTML =
      '<img src="' + qrUrl + '" width="200" height="200" alt="QR code video">' +
      (cap ? '<p class="video-caption">' + cap + '</p>' : '') +
      '<p class="video-qr-url">' + ytUrl + '</p>';
    wrap.parentNode.insertBefore(div, wrap.nextSibling);
    inserted.push(div);
  });

  window.addEventListener('afterprint', function cleanup() {
    inserted.forEach(function(d) { d.remove(); });
    window.removeEventListener('afterprint', cleanup);
  });

  window.print();
}

// ── Font accessibility toggle ──────────────────────────────────
function toggleFont() {
  const body = document.body;
  const btn  = document.getElementById('font-toggle');
  const active = body.classList.toggle('accessible-font');
  btn.setAttribute('aria-pressed', active.toString());
  btn.textContent = active ? 'Aa  standard' : 'Aa\u2009 leggibilità';
  localStorage.setItem('lv-font', active ? '1' : '');
}
(function() {
  if (localStorage.getItem('lv-font')) {
    document.body.classList.add('accessible-font');
    const btn = document.getElementById('font-toggle');
    if (btn) { btn.setAttribute('aria-pressed','true'); btn.textContent = 'Aa  standard'; }
  }
})();

// ── Reading progress bar ───────────────────────────────────────
(function() {
  var bar = document.getElementById('read-progress');
  if (!bar) return;
  function update() {
    var doc = document.documentElement;
    var scrolled = doc.scrollTop || document.body.scrollTop;
    var total = doc.scrollHeight - doc.clientHeight;
    bar.style.width = (total > 0 ? (scrolled / total * 100) : 0) + '%';
  }
  window.addEventListener('scroll', update, { passive: true });
  update();
})();

// ── Sidebar TOC: costruisce l'indice e segna la sezione attiva ─
(function() {
  var toc   = document.getElementById('sidebar-toc');
  var prose = document.querySelector('.chapter-prose');
  if (!toc || !prose) return;

  var headings = prose.querySelectorAll('h1, h2');
  if (!headings.length) return;

  var items = [];
  var h1count = 0;
  headings.forEach(function(h) {
    if (!h.id) {
      h.id = 'sec-' + h.textContent.trim().toLowerCase()
        .replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-').slice(0, 40);
    }
    var li = document.createElement('li');
    if (h.tagName === 'H2') {
      li.className = 'toc-h2';
    } else {
      h1count++;
    }
    var a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = (h.tagName === 'H1' ? h1count + '. ' : '') + h.textContent;
    li.appendChild(a);
    toc.appendChild(li);
    items.push({ el: h, link: a });
  });

  var OFFSET = 80;
  function updateActive() {
    var scrollY = window.scrollY + OFFSET;
    var current = null;
    items.forEach(function(item) {
      if (item.el.getBoundingClientRect().top + window.scrollY <= scrollY) current = item;
    });
    items.forEach(function(item) { item.link.classList.remove('active'); });
    if (current) current.link.classList.add('active');
  }
  window.addEventListener('scroll', updateActive, { passive: true });
  updateActive();
})();
</script>
